    <script>
        // Раскрашиваем доску
        const rows = document.querySelectorAll('table tr');
        
        // Проходим по строкам с 1 по 8 (реальные строки доски)
        for (let i = 1; i <= 8; i++) {
            const cells = rows[i].querySelectorAll('td');
            // Проходим по столбцам от 1 до 8 (реальные клетки доски)
            for (let j = 1; j <= 8; j++) {
                const cell = cells[j];
                if (cell) {
                    // Определяем цвет клетки
                    const isLight = (i + j) % 2 === 0;
                    cell.style.backgroundColor = isLight ? '#ffce9e' : '#d18b47';
                }
            }
        }
    </script>
